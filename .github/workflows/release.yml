name: Build and Release VSIX

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Compile extension
        working-directory: vscode-extension
        run: npm run compile

      - name: Package VSIX
        working-directory: vscode-extension
        run: npm run package

      - name: Locate VSIX file
        id: find_vsix
        working-directory: vscode-extension
        run: |
          VSIX_PATH=$(ls *.vsix | head -1)
          echo "vsix_path=vscode-extension/$VSIX_PATH" >> "$GITHUB_OUTPUT"
          echo "vsix_name=$VSIX_PATH" >> "$GITHUB_OUTPUT"
          echo "Found VSIX: $VSIX_PATH"

      - name: Upload VSIX as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-package
          path: ${{ steps.find_vsix.outputs.vsix_path }}
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-package

      - name: Get tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload VSIX
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "AI Code Reviewer ${{ steps.tag.outputs.tag }}"
          body: |
            ## AI Code Reviewer ${{ steps.tag.outputs.tag }}

            ### Installation

            **Mac / Linux:**
            ```bash
            export GITHUB_TOKEN=ghp_yourtoken
            curl -fsSL https://raw.githubusercontent.com/bhimsekhar/ai-code-reviewer/main/install/install.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            $env:GITHUB_TOKEN = "ghp_yourtoken"
            irm https://raw.githubusercontent.com/bhimsekhar/ai-code-reviewer/main/install/install.ps1 | iex
            ```

            ### What's included
            - VS Code extension (VSIX) — embedded coordinator, streamer, gate UI
            - Claude Code plugin — PostToolUse hook + system prompt injection

            ### Requirements
            - VS Code 1.85+
            - Claude Code CLI
            - Node.js not required (VS Code ships its own)
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: "*.vsix"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
